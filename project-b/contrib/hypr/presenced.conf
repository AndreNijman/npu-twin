# presenced — Hyprland include fragment
#
# Include from your hyprland.conf:
#   source = ~/src/npu-twin/project-b/contrib/hypr/presenced.conf
# or copy these binds into your own keybind block.
#
# Assumes presenced.service is installed in the --user scope:
#   systemctl --user link ~/src/npu-twin/project-b/contrib/systemd/presenced.service
#   systemctl --user daemon-reload
#   systemctl --user enable --now presenced.service

# SUPER+SHIFT+P — toggle presenced on/off (fast way to silence it during
# a presentation, screenshare, or when the webcam is covered).
bind = SUPER SHIFT, P, exec, sh -c 'systemctl --user is-active --quiet presenced.service && systemctl --user stop presenced.service || systemctl --user start presenced.service'

# SUPER+L — manual lock (the presenced AWAY path eventually calls this
# via its PRESENCED_AWAY_ACTION, but a human-driven backstop is useful).
bind = SUPER, L, exec, loginctl lock-session
